name: AWS Lambda Deploy

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
      aws-region:
        required: false
        type: string
        default: 'us-east-1'
      ecr-repository:
        required: true
        type: string
      function-name:
        required: true
        type: string
      image-tag:
        required: false
        type: string
        default: ${{ github.sha }}
      aws-role-arn:
        required: false
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false

jobs:
  deploy:
    name: Build, Push and Update Lambda
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build and Push to ECR
        uses: xlmriosx/shared-library/actions/aws-ecr-push@main
        with:
          working-directory: ${{ inputs.working-directory }}
          aws-region: ${{ inputs.aws-region }}
          ecr-repository: ${{ inputs.ecr-repository }}
          image-tag: ${{ inputs.image-tag }}
          aws-role-arn: ${{ inputs.aws-role-arn }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || '' }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || '' }}

      - name: Update Lambda Image
        uses: xlmriosx/shared-library/actions/aws-lambda-update@main
        with:
          aws-region: ${{ inputs.aws-region }}
          function-name: ${{ inputs.function-name }}
          ecr-repository: ${{ inputs.ecr-repository }}
          image-tag: ${{ inputs.image-tag }}
          role-to-assume: ${{ inputs.aws-role-arn || '' }}

      - name: Notify on Completion
        if: always()
        uses: xlmriosx/shared-library/actions/notify@main
        with:
          status: ${{ job.status }}
          teams_webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          steps_context: ${{ toJson(steps) }}
          title: 'AWS Lambda Deploy Completed'
