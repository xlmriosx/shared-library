name: 'Agnostic Notify'
description: 'Send notifications to various platforms (Teams, Slack) based on job status'

inputs:
  status:
    description: 'The status of the job (success, failure, cancelled)'
    required: true
  teams_webhook_url:
    description: 'Microsoft Teams Webhook URL'
    required: false
  slack_webhook_url:
    description: 'Slack Webhook URL'
    required: false
  discord_webhook_url:
    description: 'Discord Webhook URL'
    required: false
  steps_context:
    description: 'JSON context of the steps to display their status (pass toJson(steps))'
    required: false
  title:
    description: 'Custom title for the notification'
    required: false
    default: 'GitHub Actions Run Status'

runs:
  using: "composite"
  steps:
    # ---------------------------------------------------------
    # MICROSOFT TEAMS NOTIFICATION
    # ---------------------------------------------------------
    - name: Notify Microsoft Teams
      if: ${{ inputs.teams_webhook_url != '' }}
      shell: bash
      run: |
        COLOR="808080" # Default (Cancelled)
        if [ "${{ inputs.status }}" == "success" ]; then
          COLOR="28a745" # Green
        elif [ "${{ inputs.status }}" == "failure" ]; then
          COLOR="dc3545" # Red
        fi
        
        PAYLOAD=$(cat <<EOF
        {
          "@type": "MessageCard",
          "@context": "http://schema.org/extensions",
          "themeColor": "$COLOR",
          "summary": "${{ inputs.title }}",
          "sections": [{
            "activityTitle": "${{ inputs.title }}",
            "activitySubtitle": "Status: ${{ inputs.status }}",
            "facts": [
              { "name": "Repository:", "value": "${{ github.repository }}" },
              { "name": "Ref:", "value": "${{ github.ref }}" },
              { "name": "Actor:", "value": "${{ github.actor }}" }
            ],
            "markdown": true
          }]
        }
        EOF
        )
        
        curl -H "Content-Type: application/json" -d "$PAYLOAD" "${{ inputs.teams_webhook_url }}"

    # ---------------------------------------------------------
    # SLACK NOTIFICATION
    # ---------------------------------------------------------
    - name: Notify Slack
      if: ${{ inputs.slack_webhook_url != '' }}
      shell: bash
      run: |
        EMOJI="⚪" # Default (Cancelled)
        if [ "${{ inputs.status }}" == "success" ]; then
          EMOJI="✅"
        elif [ "${{ inputs.status }}" == "failure" ]; then
          EMOJI="❌"
        fi
        
        PAYLOAD=$(cat <<EOF
        {
          "text": "$EMOJI *${{ inputs.title }}*\n*Status:* ${{ inputs.status }}\n*Repo:* ${{ github.repository }}\n*Actor:* ${{ github.actor }}"
        }
        EOF
        )
        
        curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "${{ inputs.slack_webhook_url }}"

    # ---------------------------------------------------------
    # DISCORD NOTIFICATION
    # ---------------------------------------------------------
    - name: Notify Discord
      if: ${{ inputs.discord_webhook_url != '' }}
      shell: bash
      run: |
        EMBED_COLOR="8421504" # Default gray
        if [ "${{ inputs.status }}" == "success" ]; then
          EMBED_COLOR="3066993" # Green
        elif [ "${{ inputs.status }}" == "failure" ]; then
          EMBED_COLOR="15158332" # Red
        fi

        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        
        FIELDS_JSON="[]"
        if [ -n '${{ inputs.steps_context }}' ] && [ '${{ inputs.steps_context }}' != 'null' ]; then
          FIELDS_JSON=$(echo '${{ inputs.steps_context }}' | jq -c '[to_entries[] | {name: (.key | if length > 256 then .[0:253]+"..." else . end), value: (if (.value.outcome // .value.result) == "success" then "✅ Success" elif (.value.outcome // .value.result) == "failure" then "❌ Failure" elif (.value.outcome // .value.result) == "skipped" then "⏭️ Skipped" else "⚪ " + (.value.outcome // .value.result) end), inline: true}]')
        fi
        
        if [ -z "$FIELDS_JSON" ]; then
          FIELDS_JSON="[]"
        fi

        PAYLOAD=$(jq -n \
          --arg title "${{ inputs.title }}" \
          --arg status "${{ inputs.status }}" \
          --arg repo "${{ github.repository }}" \
          --arg actor "${{ github.actor }}" \
          --arg url "$RUN_URL" \
          --arg color "$EMBED_COLOR" \
          --argjson fields "$FIELDS_JSON" \
          '{
            embeds: [{
              title: $title,
              url: $url,
              color: ($color | tonumber),
              description: "**Status:** \($status)\n**Repository:** \($repo)\n**Triggered by:** \($actor)\n\n[🔗 **Ver Corrida en GitHub**](\($url))",
              fields: $fields
            }]
          }')
        
        curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "${{ inputs.discord_webhook_url }}"
