name: 'AWS Lambda Update'
description: 'Updates an AWS Lambda function with a new container image from ECR'
inputs:
  role-to-assume:
    description: 'The AWS IAM Role ARN to assume via OIDC'
    required: false
  aws-region:
    description: 'The AWS region'
    required: true
  function-name:
    description: 'The name of the Lambda function to update'
    required: true
  ecr-repository:
    description: 'The name of the ECR repository'
    required: true
  image-tag:
    description: 'The tag of the image to deploy'
    required: false
    default: ${{ github.sha }}
runs:
  using: "composite"
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - name: Get AWS Account ID
      id: account
      shell: bash
      run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

    - name: Update Lambda Image
      shell: bash
      run: |
        IMAGE_URI="${{ steps.account.outputs.account_id }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}"
        aws lambda update-function-code \
          --function-name ${{ inputs.function-name }} \
          --image-uri $IMAGE_URI
