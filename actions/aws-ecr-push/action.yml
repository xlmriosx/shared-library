name: 'AWS ECR Push'
description: 'Builds, scans, and pushes a Docker image to Amazon ECR'
inputs:
  working-directory:
    description: 'The working directory containing the Dockerfile'
    required: false
    default: '.'
  aws-region:
    description: 'The AWS region'
    required: false
    default: 'us-east-1'
  ecr-repository:
    description: 'The name of the ECR repository'
    required: true
  image-tag:
    description: 'The tag of the image to deploy'
    required: true
  aws-role-arn:
    description: 'The AWS IAM Role ARN to assume via OIDC'
    required: false
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: false
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: false
outputs:
  image-uri:
    description: 'The full URI of the pushed image'
    value: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}
runs:
  using: "composite"
  steps:
    - name: Configure AWS Credentials
      id: aws-creds
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build image
      id: build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ inputs.ecr-repository }}
        IMAGE_TAG: ${{ inputs.image-tag }}
      run: docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

    - name: Run Trivy vulnerability scanner on image
      id: trivy
      uses: xlmriosx/shared-library/actions/trivy-scan@main
      with:
        scan-type: 'image'
        scan-ref: '${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}'

    - name: Push image to Amazon ECR
      id: push
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ inputs.ecr-repository }}
        IMAGE_TAG: ${{ inputs.image-tag }}
      run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
